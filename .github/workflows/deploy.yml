name: CI/CD to Kubernetes

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build --no-cache -t yash4200/insurance-backend:latest ./backend

      - name: Build frontend image
        run: docker build --no-cache -t yash4200/insurance-frontend:latest ./frontend

      - name: Push backend image
        run: docker push yash4200/insurance-backend:latest

      - name: Push frontend image
        run: docker push yash4200/insurance-frontend:latest

      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl set image deployment/backend backend=yash4200/insurance-backend:latest
            kubectl set image deployment/frontend frontend=yash4200/insurance-frontend:latest
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/frontend
